name: Bug Report
description: Something isn't working right
labels: ["bug", "needs triage"]
assignees: ["Clonephaze"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill this out! The more detail you provide, the faster it can be fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong, not what you expected. Include any relevant error messages, like console logs or the like.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Walk through exactly what you did before hitting the bug.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Attach screenshots, or anything else that might help.
    validations:
      required: false
